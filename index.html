    <script>
        var animation1 = lottie.loadAnimation({
        container: document.getElementById('lottie'), // 애니메이션을 표시할 div
        renderer: 'svg', // 애니메이션 렌더링 방식
        loop: false, // 애니메이션 반복 여부
        autoplay: false, // 자동 재생 비활성화
        path: './js2/terryfic.json' // JSON 파일 경로
        });

        animation1.goToAndStop(0, true);

        // 애니메이션 로드 완료 시 실행
        animation1.addEventListener('DOMLoaded', function () {
            animation1.goToAndStop(0, true); // 초기 프레임으로 이동
            animation1.play(); // 재생
        });

        // lottie-web로 애니메이션을 초기화합니다
        var animation2 = lottie.loadAnimation({
          container: document.getElementById('lottie_window'), // 애니메이션을 표시할 div
          renderer: 'svg', // 애니메이션 렌더링 방식 (svg, canvas, html 중 선택)
          loop: false, // 애니메이션 반복 여부
          autoplay: false, // 자동 재생 여부
          path: './js2/icon_optionbar.json' // JSON 파일 경로 (로컬 경로 또는 외부 URL)
        });


        let lottie_window = document.querySelector("#lottie_window")
        let count = 0;

        lottie_window.addEventListener("click",function(){
            count++
            if(count % 2 === 1){
            
                animation2.play()
                animation2.addEventListener('complete', () => {
                    animation2.pause();
                });
            }else{
                animation2.setDirection(-1)
                animation2.play()
                animation2.addEventListener('complete', () => {
                    animation2.pause();
                });
            
            }
        })

        
    </script>
